name: Deploy project
on: workflow_dispatch
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code from repo
        uses: actions/checkout@v6

      - name: Install Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
      
      - name: Install dependencies
        run: npm ci

      - name: linting
        run: npm run lint

      - name: testing
        run: npm run test
      
      - name: building
        run: npm run build

      