name: Running Docker container
on:
  workflow_dispatch:
    branches:
      - master

jobs:
  test:
    environment: testing
    runs-on: ubuntu-latest
    env:
      NODE_ENV: ${{ secrets.NODE_ENV }}
    container:
      image: node:trixie
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: sa-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: build
        run: npm build
      - name: Run tests
        run: npm test
      


