name: Running Docker container
on:
  workflow_dispatch:
    branches:
      - master

jobs:
  test:
    environment: testing
    runs-on: ubuntu-latest
    env:
      NODE_ENV: ${{ secrets.NODE_ENV }}
    container:
      image: node:trixie
    services:
      mongo:
        image: mongo 
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example

    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: sa-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: build
        run: npm run build

      - name: Check MongoDB connection
        run: nc -z mongo 27017

      - name: Run tests
        run: npm test

      


