name: Artifact working
on:
  push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build Artifact
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist_files
          path: dist

  deploy:
    needs: build
    steps:
      - name: download artifact
        uses: actions/download-artifact@v7
        with:
          name: dist_files
      
      - name: output content
        run: ls

      - name: deploy
        run: echo "deploying..."