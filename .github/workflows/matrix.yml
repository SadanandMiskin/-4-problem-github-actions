name: Matrix demo
on:
  push:
    branches:
      - master

jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        node_ver: [20, 21]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_ver }}